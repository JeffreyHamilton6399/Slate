  <body>
    <style>
      /* Boot placeholder — replaced the moment React mounts. If scripts fail
         (stale cache after a deploy), the delayed hint tells the user what to
         do instead of leaving a black screen. */
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0c0c0e;
        color: #8b8a99;
        font: 14px/1.5 system-ui, sans-serif;
        text-align: center;
      }
      #boot .spin {
        width: 28px;
        height: 28px;
        margin: 0 auto 14px;
        border: 2px solid #26262e;
        border-top-color: #7c6aff;
        border-radius: 50%;
        animation: bootspin 0.9s linear infinite;
      }
      #boot .hint {
        opacity: 0;
        margin-top: 10px;
        font-size: 12px;
        animation: boothint 0.5s ease 8s forwards;
      }
      @keyframes bootspin { to { transform: rotate(1turn); } }
      @keyframes boothint { to { opacity: 1; } }
    </style>
    <div id="root">
      <div id="boot">
        <div>
          <div class="spin"></div>
          <div>Loading Slate…</div>
          <div class="hint">Stuck? Refresh the page (Ctrl+Shift+R) to fetch the latest version.</div>
        </div>
      </div>
    </div>
  </body>

# Render Blueprint — free-tier deploy of the full Slate app (server + client
# in one Docker image). In the Render dashboard: New → Blueprint → this repo.
#
# Free-tier notes:
#   - Instance sleeps after ~15 min idle; first request wakes it (~30-60s).
#   - No persistent disk, so server-side Yjs snapshots reset on restart.
#     Boards live in each browser's IndexedDB and re-seed the server on
#     reconnect, so this is acceptable for casual use.
services:
  - type: web
    name: slate
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Random signing secret generated by Render on first deploy.
      - key: JWT_SECRET
        generateValue: true
      # If you also host the client on Vercel, uncomment and set your origin
      # so the static client may call this server cross-origin:
      # - key: CORS_ORIGINS
      #   value: https://your-app.vercel.app
      # To enable the AI chat panel served from this server (/api/ai-chat),
      # set these in the Render dashboard (sync: false hides the values):
      # - key: ZAI_BASE_URL
      #   sync: false
      # - key: ZAI_API_KEY
      #   sync: false
      # - key: ZAI_TOKEN
      #   sync: false

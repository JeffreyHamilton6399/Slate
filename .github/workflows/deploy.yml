name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check Fly token
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::FLY_API_TOKEN is empty. Add a Fly deploy token:"
            echo "  1. Locally: fly auth token   (or: fly tokens create deploy -x 999999h)"
            echo "  2. GitHub repo → Settings → Secrets and variables → Actions"
            echo "     New secret name exactly: FLY_API_TOKEN"
            echo "  If this job uses environment 'production', also add the same secret under:"
            echo "  Settings → Environments → production → Environment secrets"
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify Fly token (whoami)
        run: flyctl auth whoami
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# Render Blueprint — deploys the Slate app that lives in the slate/ subdirectory.
#
# This file must be at the REPO ROOT for Render's blueprint sync to find it.
# The repo used to be the Slate workspace itself (Dockerfile at the root); on
# 2026-07-14 it was flattened into slate/ inside this outer repo, which broke
# every deploy with "Dockerfile: no such file or directory". `rootDir` points
# the service back at the workspace — all paths below are relative to it, and
# only changes under slate/ trigger builds.
#
# Free-tier notes:
#   - Instance sleeps after ~15 min idle; first request wakes it (~30-60s).
#   - No persistent disk, so server-side Yjs snapshots reset on restart.
#     Boards live in each browser's IndexedDB and re-seed the server on
#     reconnect, so this is acceptable for casual use.
services:
  - type: web
    name: slate
    runtime: docker
    plan: free
    rootDir: slate
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Random signing secret generated by Render on first deploy.
      - key: JWT_SECRET
        generateValue: true
      # The Vercel-hosted client calls this server cross-origin.
      - key: CORS_ORIGINS
        value: https://slate-client.vercel.app

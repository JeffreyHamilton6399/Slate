<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Slate">
<!-- If you deploy only static HTML (e.g. GitHub Pages), set this to your Node/Fly/Railway host that runs server.js so PeerJS has a signaling server (hostname only, no protocol). -->
<meta name="slate-public-peer-host" content="">
<title>Slate</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230f0f12'/%3E%3Cpath d='M6 24l8-16 4 8 8-8' stroke='%238b7cf7' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tldraw@3.6.0/tldraw.css">
<style>
  :root {
    --bg:          #0f0f12;
    --bg2:         #13131a;
    --bg3:         #1a1a22;
    --border:      #252530;
    --border2:     #2e2e3a;
    --accent:      #8b7cf7;
    --accent-dim:  #3d3580;
    --accent-glow: rgba(139,124,247,0.18);
    --text:        #eceaf4;
    --text-dim:    #6c6a78;
    --text-mid:    #9d9baf;
    --mono:        ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    --sans:        ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --radius:      10px;
    --radius-sm:   6px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg); }
  #root { position: fixed; inset: 0; height: 100%; display: none; }

  /* ── Lobby ── */
  #onboarding {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px; padding: 32px;
    background: var(--bg);
  }
  #onboarding.gone { display: none; }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.22;
    animation: bgDrift 28s linear infinite;
  }
  @keyframes bgDrift {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 40px 40px, -40px 40px; }
  }

  .ob-logo {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative; z-index: 1;
  }
  .ob-logo-icon {
    width: 68px; height: 68px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent-dim), #111118);
    border: 1px solid var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .ob-logo h1 {
    font-family: var(--sans); font-size: 2.8rem; font-weight: 800;
    letter-spacing: -0.02em; margin: 0;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .ob-logo p {
    font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim);
    letter-spacing: 0.22em; text-transform: uppercase; margin: 0;
  }

  .ob-card {
    width: 100%; max-width: 340px; position: relative; z-index: 1;
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
    padding: 28px; display: flex; flex-direction: column; gap: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    animation: fadeUp 0.5s 0.08s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .ob-field { display: flex; flex-direction: column; gap: 6px; }
  .ob-label {
    font-family: var(--mono); font-size: 0.62rem; color: var(--text-dim);
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .ob-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-family: var(--mono); font-size: 0.95rem; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ob-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .ob-input::placeholder { color: var(--text-dim); }
  .ob-join {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 14px;
    font-family: var(--sans); font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.04em; cursor: pointer;
    box-shadow: 0 4px 20px rgba(139,124,247,0.35);
    transition: opacity 0.15s, box-shadow 0.2s;
  }
  .ob-join:hover  { opacity: 0.88; box-shadow: 0 4px 30px rgba(139,124,247,0.5); }
  .ob-join:active { opacity: 0.72; transform: scale(0.98); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* ── In-canvas chrome (minimal pill + menu) ── */
  .slate-chrome {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 300000;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
    font-family: var(--sans);
    pointer-events: none;
  }
  .slate-chrome > * { pointer-events: auto; }

  .slate-chrome__bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 6px 5px 10px;
    max-width: min(calc(100vw - 24px), 280px);
    user-select: none;
    -webkit-user-select: none;
    background: rgba(10, 10, 14, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 100px;
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    box-shadow:
      0 1px 0 rgba(255,255,255,.04) inset,
      0 8px 32px rgba(0,0,0,.35);
  }

  .slate-chrome__dot {
    flex-shrink: 0;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,.22);
    box-shadow: 0 0 0 1px rgba(0,0,0,.4) inset;
    transition: background 0.25s ease, box-shadow 0.25s ease;
  }
  .slate-chrome[data-conn="on"] .slate-chrome__dot {
    background: #5fd4a4;
    box-shadow: 0 0 10px rgba(95,212,164,.45);
  }
  .slate-chrome[data-conn="wait"] .slate-chrome__dot {
    background: #e8b84a;
    box-shadow: 0 0 8px rgba(232,184,74,.35);
  }
  .slate-chrome[data-conn="off"] .slate-chrome__dot {
    background: #e85a6a;
    box-shadow: 0 0 6px rgba(232,90,106,.25);
  }

  .slate-chrome__meta {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    line-height: 1.2;
  }
  .slate-chrome__room {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .slate-chrome__peers {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--text-mid);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .slate-chrome__btns {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .slate-btn {
    font: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: none;
    border-radius: 100px;
    padding: 6px 11px;
    color: var(--text-mid);
    background: transparent;
    transition: color 0.15s, background 0.15s;
  }
  .slate-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,.06);
  }
  .slate-btn:active { transform: scale(0.97); }
  .slate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .slate-btn--icon {
    width: 32px;
    height: 32px;
    padding: 0;
    font-size: 18px;
    line-height: 1;
    letter-spacing: 0;
    color: var(--text-mid);
    border-radius: 50%;
  }
  .slate-btn--icon:hover { color: var(--text); }

  .slate-menu {
    margin-top: 8px;
    min-width: 200px;
    max-width: min(calc(100vw - 24px), 260px);
    padding: 10px 0;
    background: rgba(12, 12, 16, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 14px;
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 16px 48px rgba(0,0,0,.5);
    animation: slateMenuIn 0.18s ease-out both;
  }
  @keyframes slateMenuIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slate-menu[hidden] { display: none !important; }

  .slate-menu__section {
    padding: 0 12px 10px;
    border-bottom: 1px solid rgba(255,255,255,.05);
  }
  .slate-menu__section:last-child { border-bottom: none; padding-bottom: 0; }

  .slate-menu__label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .slate-menu__input {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(0,0,0,.35);
    color: var(--text);
    font: inherit;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .slate-menu__input:focus {
    border-color: rgba(139,124,247,.45);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .slate-menu__input::placeholder { color: var(--text-dim); }

  .slate-menu__actions {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 8px;
    padding-bottom: 0;
  }
  .slate-menu__action {
    width: 100%;
    text-align: left;
    font: inherit;
    font-size: 12px;
    padding: 9px 12px;
    margin: 0 -2px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-mid);
    background: transparent;
    transition: background 0.12s, color 0.12s;
  }
  .slate-menu__action:hover {
    color: var(--text);
    background: rgba(255,255,255,.06);
  }
  .slate-menu__action:active { background: rgba(255,255,255,.09); }
  .slate-banner {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300001;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: rgba(30, 30, 36, 0.95);
    color: #c4c0d4;
    border: 1px solid rgba(255, 255, 255, 0.08);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .slate-banner.show { opacity: 1; }
  .slate-banner.err { border-color: rgba(248, 113, 113, 0.45); color: #fecaca; }
  #slate-file-warn {
    display: none;
    margin: 0;
    padding: 12px 16px;
    background: #3d2a1a;
    color: #fcd9a6;
    font: 13px/1.45 system-ui, sans-serif;
    border-bottom: 1px solid rgba(255,180,100,.35);
    text-align: center;
  }
  #slate-file-warn.show { display: block; }
</style>

<script>
(function loadPeerJS() {
  const cdns = [
    'https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js',
    'https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js',
  ];
  let i = 0;
  function tryNext() {
    if (i >= cdns.length) {
      window.__peerjsLoadFailed = true;
      return;
    }
    const s = document.createElement('script');
    s.src = cdns[i++];
    s.onerror = tryNext;
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<!-- tldraw is published as ES modules (no official UMD build); we load it from esm.sh with no local bundler. -->
<script type="module">
const TLDRAW_VERSION = '3.6.0';
const REACT_VERSION = '18.3.1';

import React, { useCallback, useEffect, useMemo, useRef, useState } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import { Tldraw, createTLStore, exportAs } from 'https://esm.sh/tldraw@3.6.0?deps=react@18.3.1,react-dom@18.3.1';

const CONFIG = { appName: 'Slate' };

function isPrivateNetworkHost(host) {
  const h = String(host || '').toLowerCase();
  return h === 'localhost' || h === '127.0.0.1' || h === '::1' ||
    h.endsWith('.local') || /^10\./.test(h) || /^192\.168\./.test(h) ||
    /^172\.(1[6-9]|2\d|3[0-1])\./.test(h);
}

function configuredPeerBrokers() {
  const params = new URLSearchParams(location.search);
  const metaPublished = document.querySelector('meta[name="slate-public-peer-host"]')?.getAttribute('content')?.trim();
  const explicitHost =
    params.get('peerHost') ||
    localStorage.getItem('slate_peer_host') ||
    (metaPublished || null);
  const explicitPort = params.get('peerPort') || localStorage.getItem('slate_peer_port');
  const explicitPath = params.get('peerPath') || localStorage.getItem('slate_peer_path');
  const secureSetting = params.get('peerSecure') || localStorage.getItem('slate_peer_secure');
  const secure = secureSetting == null
    ? location.protocol === 'https:'
    : ['1', 'true', 'yes'].includes(String(secureSetting).toLowerCase());
  // Same broker order and cloud entries as Chirp (proven on static hosts + self-hosted Node).
  const cloudBrokers = [
    { name: 'PeerJS cloud', host: '0.peerjs.com', port: 443, path: '/', secure: true, key: 'peerjs' },
    { name: 'PeerJS default cloud' },
  ];
  const brokers = [];

  if (explicitHost) {
    brokers.push({
      name: 'Custom Slate server',
      host: explicitHost,
      port: Number(explicitPort || (secure ? 443 : 80)),
      path: explicitPath || '/peerjs',
      secure,
      key: 'peerjs',
    });
  }

  if (!explicitHost) brokers.push(...cloudBrokers);

  if (/^https?:$/.test(location.protocol) && location.hostname) {
    brokers.push({
      name: isPrivateNetworkHost(location.hostname) ? 'Slate local server' : 'Slate hosted server',
      host: location.hostname,
      port: Number(location.port || (location.protocol === 'https:' ? 443 : 80)),
      path: '/peerjs',
      secure: location.protocol === 'https:',
      key: 'peerjs',
    });
  }

  if (explicitHost) brokers.push(...cloudBrokers);
  return brokers;
}

const BROKERS = configuredPeerBrokers();

function randomRoomId(len = 6) {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  const a = new Uint8Array(len);
  crypto.getRandomValues(a);
  let s = '';
  for (let i = 0; i < len; i++) s += chars[a[i] % chars.length];
  return s;
}

function getRoomFromLocation() {
  let raw = (location.hash || '').replace(/^#/, '').trim();
  if (!raw) {
    raw = randomRoomId();
    history.replaceState(null, '', `#${encodeURIComponent(raw)}`);
  }
  try {
    return decodeURIComponent(raw);
  } catch {
    return raw;
  }
}

function roomToHostPeerId(room) {
  const compact = btoa(unescape(encodeURIComponent(room)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  const id = `slate-${compact}`.replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 59);
  return id.length >= 6 ? id : `slate-${compact.padEnd(6, '0')}`.slice(0, 59);
}

function toast(msg, isErr) {
  const el = document.getElementById('slate-banner');
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle('err', !!isErr);
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 3200);
}

function wireToolbar(roomName, peerLabel) {
  const wrap = document.getElementById('slate-ui');
  const roomEl = document.getElementById('slate-room');
  const peersEl = document.getElementById('slate-peers');
  const shareBtn = document.getElementById('slate-share');
  if (!wrap || !roomEl || !peersEl || !shareBtn) return;
  wrap.hidden = false;
  roomEl.textContent = `#${roomName}`;
  const short = String(peerLabel || '')
    .replace(/^Host ·\s*/i, '')
    .replace(/^Guest ·\s*/i, '');
  peersEl.textContent = short || '…';
  peersEl.title = peerLabel;
  const pl = String(peerLabel || '').toLowerCase();
  if (pl.includes('offline') || pl.includes('no peerjs')) wrap.dataset.conn = 'off';
  else if (pl.includes('reconnect') || pl.includes('finding') || pl.includes('timeout') || pl.includes('syncing') || pl.includes('connecting') || pl.includes('channel')) wrap.dataset.conn = 'wait';
  else wrap.dataset.conn = 'on';

  shareBtn.onclick = async () => {
    const url = location.href;
    try {
      await navigator.clipboard.writeText(url);
      toast('Room link copied');
    } catch {
      try {
        shareBtn.disabled = true;
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Room link copied');
      } catch {
        toast('Could not copy link', true);
      } finally {
        shareBtn.disabled = false;
      }
    }
  };
}

function wireSlateChrome(editor, room) {
  const chrome = document.getElementById('slate-ui');
  const menu = document.getElementById('slate-menu');
  const menuBtn = document.getElementById('slate-menu-btn');
  const fit = document.getElementById('slate-fit');
  const pngBtn = document.getElementById('slate-export-png');
  const jsonBtn = document.getElementById('slate-export-json');
  const newBtn = document.getElementById('slate-new-room');
  const joinBtn = document.getElementById('slate-join-room');
  const nameEl = document.getElementById('slate-name');
  if (!chrome || !menu || !menuBtn || !fit || !pngBtn || !jsonBtn || !newBtn || !joinBtn || !nameEl) return () => {};

  const safeSlug = (s) => String(s || 'room').replace(/[^\w-]+/g, '_').slice(0, 48) || 'room';

  function closeMenu() {
    menu.hidden = true;
    menuBtn.setAttribute('aria-expanded', 'false');
  }
  function toggleMenu(ev) {
    ev.stopPropagation();
    const open = menu.hidden;
    menu.hidden = !open;
    menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  const onDocClick = (ev) => {
    if (!chrome.contains(ev.target)) closeMenu();
  };

  const applyName = () => {
    const v = nameEl.value.trim().slice(0, 28);
    try { sessionStorage.setItem('slate_display_name', v); } catch (_) {}
    try {
      if (editor.user?.updateUserPreferences) {
        editor.user.updateUserPreferences(v ? { name: v } : { name: '' });
      }
    } catch (_) {}
  };
  try {
    nameEl.value = sessionStorage.getItem('slate_display_name') || '';
  } catch (_) {}
  nameEl.addEventListener('input', applyName);
  if (nameEl.value) queueMicrotask(applyName);

  const onFit = () => {
    try { editor.zoomToFit({ animation: { duration: 220 } }); } catch (_) {}
    closeMenu();
  };
  const onPng = async () => {
    try {
      const ids = [...editor.getCurrentPageShapeIds()];
      await exportAs(editor, ids, { format: 'png', name: `slate-${safeSlug(room)}` });
      toast('PNG downloaded');
    } catch (_) {
      toast('PNG export failed', true);
    }
    closeMenu();
  };
  const onJson = () => {
    try {
      const snap = editor.store.getStoreSnapshot('document');
      const blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `slate-${safeSlug(room)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      toast('JSON downloaded');
    } catch (_) {
      toast('JSON export failed', true);
    }
    closeMenu();
  };
  const onNew = () => {
    const r = randomRoomId(7);
    location.assign(`${location.pathname}${location.search}#${encodeURIComponent(r)}`);
  };
  const onJoin = () => {
    const raw = window.prompt('Open room (name goes in the URL hash):', room);
    if (raw == null) return;
    const r = raw.trim().slice(0, 64);
    if (!r) return;
    location.assign(`${location.pathname}${location.search}#${encodeURIComponent(r)}`);
    closeMenu();
  };
  const onKey = (ev) => {
    if (ev.key === 'Escape') {
      closeMenu();
      return;
    }
    if (ev.ctrlKey && ev.shiftKey && (ev.key === 'E' || ev.key === 'e')) {
      ev.preventDefault();
      onPng();
    }
  };

  menuBtn.addEventListener('click', toggleMenu);
  document.addEventListener('click', onDocClick);
  fit.addEventListener('click', onFit);
  pngBtn.addEventListener('click', onPng);
  jsonBtn.addEventListener('click', onJson);
  newBtn.addEventListener('click', onNew);
  joinBtn.addEventListener('click', onJoin);
  window.addEventListener('keydown', onKey);

  return () => {
    closeMenu();
    nameEl.removeEventListener('input', applyName);
    menuBtn.removeEventListener('click', toggleMenu);
    document.removeEventListener('click', onDocClick);
    fit.removeEventListener('click', onFit);
    pngBtn.removeEventListener('click', onPng);
    jsonBtn.removeEventListener('click', onJson);
    newBtn.removeEventListener('click', onNew);
    joinBtn.removeEventListener('click', onJoin);
    window.removeEventListener('keydown', onKey);
  };
}

function diffMessageFromEntry(entry) {
  const { added, updated, removed } = entry.changes;
  return {
    t: 'chg',
    added: Object.values(added),
    updated: Object.values(updated).map(([, to]) => to),
    removed: Object.keys(removed),
  };
}

function applyRemoteDiff(store, msg) {
  store.mergeRemoteChanges(() => {
    const put = [...(msg.added || []), ...(msg.updated || [])];
    if (put.length) store.put(put);
    const rem = msg.removed || [];
    if (rem.length) store.remove(rem);
  });
}

/** PeerJS DataConnections can already be .open when the connection callback runs — always run setup. */
function whenDataConnOpen(conn, fn) {
  if (conn.open) queueMicrotask(fn);
  else conn.on('open', fn);
}

function createPeerSync({ room, store, editorRef, setPeerLabel, brokerRotate }) {
  const hostId = roomToHostPeerId(room);
  let peer = null;
  let mode = 'idle';
  let hostConns = new Map();
  let clientConn = null;
  let unsubDoc = null;
  let unsubPre = null;
  let brokerIdx = 0;
  let netFailures = 0;
  let destroyed = false;
  let clientConnectTimer = null;

  function brokerConfig() {
    const b = BROKERS[brokerIdx % BROKERS.length] || {};
    const c = {
      debug: 0,
      host: b.host || location.hostname,
      port: b.port != null ? b.port : (location.protocol === 'https:' ? 443 : 80),
      path: b.path || '/peerjs',
      secure: !!b.secure,
      key: b.key || 'peerjs',
    };
    return c;
  }

  function broadcast(obj, exceptConn) {
    const s = JSON.stringify(obj);
    for (const c of hostConns.values()) {
      if (c.open && c !== exceptConn) {
        try { c.send(s); } catch (_) {}
      }
    }
  }

  function broadcastPresence() {
    const n = 1 + [...hostConns.values()].filter(c => c.open).length;
    if (mode === 'host') setPeerLabel(`Host · ${n} online`);
    broadcast({ t: 'pres', n });
  }

  function attachConnHandlers(conn, isHostSide) {
    conn.on('data', (raw) => {
      let msg;
      try {
        msg = typeof raw === 'string' ? JSON.parse(raw) : JSON.parse(new TextDecoder().decode(raw));
      } catch {
        return;
      }
      const editor = editorRef.current;
      if (!editor) return;

      if (isHostSide) {
        if (msg.t === 'hello') {
          const sendSnap = () => {
            const ed = editorRef.current;
            if (!ed) return false;
            try {
              const snap = ed.store.getStoreSnapshot('document');
              const payload = { t: 'full', snap };
              try {
                payload.pres = ed.store.getStoreSnapshot('presence');
              } catch (_) {}
              conn.send(JSON.stringify(payload));
            } catch (e) {
              console.warn('[Slate] snapshot send failed', e);
            }
            return true;
          };
          if (!sendSnap()) queueMicrotask(() => { if (sendSnap()) broadcastPresence(); });
          else broadcastPresence();
          return;
        }
        if (msg.t === 'chg') {
          applyRemoteDiff(editor.store, msg);
          broadcast(msg, conn);
          return;
        }
        if (msg.t === 'pch') {
          applyRemoteDiff(editor.store, msg);
          broadcast(msg, conn);
          return;
        }
        return;
      }

      if (msg.t === 'full' && msg.snap) {
        editor.store.mergeRemoteChanges(() => {
          editor.store.loadSnapshot(msg.snap);
        });
        if (msg.pres) {
          try {
            editor.store.mergeRemoteChanges(() => {
              editor.store.loadSnapshot(msg.pres);
            });
          } catch (_) {}
        }
        return;
      }
      if (msg.t === 'chg') {
        applyRemoteDiff(editor.store, msg);
        return;
      }
      if (msg.t === 'pch') {
        applyRemoteDiff(editor.store, msg);
        return;
      }
      if (msg.t === 'pres' && typeof msg.n === 'number') {
        setPeerLabel(`Guest · ${msg.n} online`);
        return;
      }
    });

    conn.on('close', () => {
      if (isHostSide) {
        hostConns.delete(conn.peer);
        broadcastPresence();
      } else if (conn === clientConn) {
        setPeerLabel('Guest · reconnecting…');
        scheduleReconnect();
      }
    });
  }

  let reconnectTimer = null;
  /** Longer delay avoids everyone hammering host-id at once after a short signaling blip. */
  function scheduleReconnect() {
    if (destroyed) return;
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      netFailures = 0;
      start();
    }, 2800);
  }

  function startListenLocal(storeInst) {
    if (unsubDoc) unsubDoc();
    if (unsubPre) unsubPre();
    unsubDoc = storeInst.listen(
      (entry) => {
        const editor = editorRef.current;
        if (!editor || destroyed) return;
        const msg = diffMessageFromEntry(entry);
        if (!msg.added.length && !msg.updated.length && !msg.removed.length) return;
        msg.t = 'chg';
        if (mode === 'host') {
          broadcast(msg, null);
        } else if (mode === 'client' && clientConn?.open) {
          try { clientConn.send(JSON.stringify(msg)); } catch (_) {}
        }
      },
      { source: 'user', scope: 'document' },
    );
    unsubPre = storeInst.listen(
      (entry) => {
        const editor = editorRef.current;
        if (!editor || destroyed) return;
        const msg = diffMessageFromEntry(entry);
        if (!msg.added.length && !msg.updated.length && !msg.removed.length) return;
        msg.t = 'pch';
        if (mode === 'host') {
          broadcast(msg, null);
        } else if (mode === 'client' && clientConn?.open) {
          try { clientConn.send(JSON.stringify(msg)); } catch (_) {}
        }
      },
      { source: 'user', scope: 'presence' },
    );
  }

  function teardownPeer() {
    if (unsubDoc) {
      unsubDoc();
      unsubDoc = null;
    }
    if (unsubPre) {
      unsubPre();
      unsubPre = null;
    }
    clearTimeout(clientConnectTimer);
    clientConnectTimer = null;
    if (clientConn) {
      try { clientConn.close(); } catch (_) {}
      clientConn = null;
    }
    for (const c of hostConns.values()) {
      try { c.close(); } catch (_) {}
    }
    hostConns.clear();
    if (peer) {
      try { peer.destroy(); } catch (_) {}
      peer = null;
    }
    mode = 'idle';
  }

  function startAsClient() {
    const cfg = brokerConfig();
    const p = new Peer(undefined, cfg);

    p.on('open', () => {
      if (destroyed) return;
      netFailures = 0;
      peer = p;
      mode = 'client';
      setPeerLabel('Guest · finding host…');
      startListenLocal(store);
      const c = p.connect(hostId, { reliable: true, serialization: 'json' });
      clientConn = c;
      c.on('error', () => {
        clearTimeout(clientConnectTimer);
        if (c.open) return;
        setPeerLabel('Guest · channel error');
        scheduleReconnect();
      });
      clearTimeout(clientConnectTimer);
      clientConnectTimer = setTimeout(() => {
        if (destroyed || !clientConn || clientConn.open) return;
        setPeerLabel('Guest · host timeout');
        toast('No host answered — open this room in one tab first, or retry.', true);
        scheduleReconnect();
      }, 14_000);
      whenDataConnOpen(c, () => {
        clearTimeout(clientConnectTimer);
        clientConnectTimer = null;
        if (destroyed) return;
        attachConnHandlers(c, false);
        try { c.send(JSON.stringify({ t: 'hello' })); } catch (_) {}
        setPeerLabel('Guest · syncing…');
      });
    });

    p.on('error', () => {
      if (destroyed) return;
      try { p.destroy(); } catch (_) {}
      netFailures++;
      brokerIdx++;
      if (netFailures > 14) {
        setPeerLabel('Offline · broker');
        toast('Could not reach a PeerJS broker.', true);
        startListenLocal(store);
        return;
      }
      brokerRotate?.();
      setTimeout(() => start(), 400);
    });

    p.on('disconnected', () => {
      if (destroyed) return;
      try {
        if (peer === p && typeof p.reconnect === 'function') {
          p.reconnect();
          return;
        }
      } catch (_) {}
      scheduleReconnect();
    });
  }

  function start() {
    if (destroyed) return;
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
    if (window.__peerjsLoadFailed || typeof Peer !== 'function') {
      setPeerLabel('Offline · no PeerJS');
      startListenLocal(store);
      toast('PeerJS failed to load — drawing works locally only.', true);
      return;
    }

    teardownPeer();

    const cfg = brokerConfig();
    const hostPeer = new Peer(hostId, cfg);

    hostPeer.on('connection', (conn) => {
      whenDataConnOpen(conn, () => {
        if (destroyed) return;
        hostConns.set(conn.peer, conn);
        attachConnHandlers(conn, true);
        broadcastPresence();
      });
    });

    hostPeer.on('open', (id) => {
      if (destroyed) return;
      if (id !== hostId) return;
      netFailures = 0;
      peer = hostPeer;
      mode = 'host';
      setPeerLabel('Host · 1 online');
      startListenLocal(store);
    });

    hostPeer.on('error', (err) => {
      if (destroyed) return;
      const msg = String(err?.message || err || '');
      const unavailable = /unavailable|ID.*taken/i.test(msg) || err?.type === 'unavailable-id';
      try { hostPeer.destroy(); } catch (_) {}
      if (unavailable) {
        netFailures = 0;
        startAsClient();
        return;
      }
      netFailures++;
      brokerIdx++;
      if (netFailures > 14) {
        setPeerLabel('Offline · broker');
        toast('Could not reach a PeerJS broker.', true);
        startListenLocal(store);
        return;
      }
      brokerRotate?.();
      setTimeout(() => start(), 400);
    });

    hostPeer.on('disconnected', () => {
      if (destroyed) return;
      try {
        if (typeof hostPeer.reconnect === 'function') {
          hostPeer.reconnect();
          return;
        }
      } catch (_) {}
      toast('Brief disconnect from room server — peers may reconnect.', false);
    });
  }

  start();

  return () => {
    destroyed = true;
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
    clearTimeout(clientConnectTimer);
    clientConnectTimer = null;
    teardownPeer();
  };
}

function SlateApp({ room }) {
  const store = useMemo(() => createTLStore(), []);
  const editorRef = useRef(null);
  const [peerLabel, setPeerLabel] = useState('Connecting…');
  const [editorReady, setEditorReady] = useState(null);

  useEffect(() => {
    wireToolbar(room, peerLabel);
  }, [room, peerLabel]);

  const onMount = useCallback((editor) => {
    editorRef.current = editor;
    setEditorReady(editor);
  }, []);

  useEffect(() => {
    if (!editorReady) return undefined;
    return createPeerSync({
      room,
      store,
      editorRef,
      setPeerLabel,
      brokerRotate: () => {},
    });
  }, [editorReady, room, store]);

  useEffect(() => {
    if (!editorReady) return undefined;
    return wireSlateChrome(editorReady, room);
  }, [editorReady, room]);

  return React.createElement(Tldraw, { store, onMount });
}

function bootstrap() {
  const room = getRoomFromLocation();
  const root = createRoot(document.getElementById('root'));
  root.render(React.createElement(SlateApp, { room }));
}

// ── Lobby ──────────────────────────────────────────────────────────────────
(function setupLobby() {
  const ob      = document.getElementById('onboarding');
  const nameEl  = document.getElementById('ob-name');
  const roomEl  = document.getElementById('ob-room');
  const joinBtn = document.getElementById('ob-join');
  const appRoot = document.getElementById('root');

  // Pre-fill room from URL hash if present
  const hashRoom = (location.hash || '').replace(/^#/, '').trim();
  roomEl.value = hashRoom ? decodeURIComponent(hashRoom) : randomRoomId();

  // Pre-fill name from previous session
  try { nameEl.value = sessionStorage.getItem('slate_display_name') || ''; } catch (_) {}

  function launch() {
    const name = nameEl.value.trim().slice(0, 28);
    const room = roomEl.value.trim().slice(0, 64) || randomRoomId();

    // Persist name so the toolbar input inherits it
    try { sessionStorage.setItem('slate_display_name', name); } catch (_) {}

    // Set canonical URL hash
    history.replaceState(null, '', `#${encodeURIComponent(room)}`);

    // Swap screens
    ob.classList.add('gone');
    appRoot.style.display = 'block';

    bootstrap();
  }

  joinBtn.addEventListener('click', launch);
  [nameEl, roomEl].forEach(el => el.addEventListener('keydown', e => {
    if (e.key === 'Enter') launch();
  }));

  // If URL already has a hash that looks like a direct share link, skip straight in
  // (user clicked a "Share" link — no need to stop them at the lobby)
  if (hashRoom && hashRoom.length >= 4) {
    // Still show lobby briefly so they can set a name; auto-focus the name field
    nameEl.focus();
  } else {
    roomEl.focus();
  }
})();
</script>
